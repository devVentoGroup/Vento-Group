name: Apply final documentary fixes

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-plan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply and validate corrections
        run: python scripts/apply-plan-final-documentary-fixes.py

      - name: Commit corrected plan
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'docs/PLAN CANÓNICO WEB/PLAN_CANONICO_VISO_WEB_STUDIO.md'
          git diff --cached --quiet && exit 0
          git commit -m 'docs: corregir cierre documental de fase 1'
          git push
