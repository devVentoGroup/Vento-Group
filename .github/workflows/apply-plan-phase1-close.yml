name: Apply canonical plan phase 1 close

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-plan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply documentary updates
        run: python scripts/apply-plan-phase1-close.py

      - name: Validate changed scope
        run: |
          set -euo pipefail
          git status --short
          test -n "$(git status --short)"
          ! git diff --quiet -- 'docs/PLAN CANÓNICO WEB/PLAN_CANONICO_VISO_WEB_STUDIO.md'

      - name: Commit plan update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add 'docs/PLAN CANÓNICO WEB/PLAN_CANONICO_VISO_WEB_STUDIO.md'
          git commit -m 'docs: cerrar fase 1 y abrir fase 2'
          git push
